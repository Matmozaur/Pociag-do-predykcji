name: CI/CD Pipeline

on:
  push:
    branches:
      - '**'
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-ci:
    name: Go CI (collector)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/go/collector
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: services/go/collector/go.mod
          cache: true
          cache-dependency-path: services/go/collector/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -race -v ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: services/go/collector
          args: --timeout=5m ./...

  python-ci:
    name: Python CI (predictor)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/python/predictor
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Lint (ruff)
        run: uv run ruff check src/ tests/

      - name: Type check (mypy)
        run: uv run mypy src/

      - name: Test (pytest)
        run: uv run pytest tests/ -v

  airflow-ci:
    name: Python CI (airflow)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: airflow
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type check (mypy)
        run: uv run mypy .

      - name: Test (pytest)
        run: uv run pytest tests/ -v

  build-placeholder:
    name: Build Placeholder
    runs-on: ubuntu-latest
    needs:
      - go-ci
      - python-ci
      - airflow-ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build placeholder
        run: |
          echo "Build stage placeholder."
          echo "TODO: Add container/image build steps when build strategy is finalized."

  deploy-placeholder:
    name: Deploy Placeholder (no deployment yet)
    runs-on: ubuntu-latest
    needs:
      - build-placeholder
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    environment:
      name: staging
    steps:
      - name: Deployment placeholder
        run: |
          echo "No deployment configured yet."
          echo "TODO: Add deployment steps (e.g., Helm/Terraform/SSH) in a future iteration."
