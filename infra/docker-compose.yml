# Local stack services for Pociag do Predykcji
# This file contains shared infrastructure and selected local application services.
#
# Usage:
#   docker compose up -d                          # core infra (postgres + otel)
#   docker compose --profile tracing up -d        # + Jaeger
#   docker compose --profile monitoring up -d     # + Prometheus + Grafana
#   docker compose --profile all up -d            # everything

name: pociag

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ── MinIO (S3-compatible object storage / data lake) ─────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging: *default-logging

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command: >
      -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/pociag-lake &&
      mc anonymous set download local/pociag-lake
      "
    restart: on-failure

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: pociag
      POSTGRES_USER: pociag
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pociag -d pociag"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging: *default-logging

  # ── Migrate (one-shot) ───────────────────────────────────────────────────────
  migrate:
    image: migrate/migrate:v4.18.1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../db/migrations:/migrations:ro
    command: >
      -path /migrations
      -database postgres://pociag:${POSTGRES_PASSWORD}@postgres:5432/pociag?sslmode=disable
      up
    restart: on-failure

  # ── OpenTelemetry Collector ──────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.117.0
    restart: unless-stopped
    volumes:
      - ./otel-collector-config.yml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC — services send traces/metrics here
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus scrape (collector self-metrics)
    logging: *default-logging

  # ── Collector Service ───────────────────────────────────────────────────────
  collector:
    build:
      context: ../services/go/collector
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      otel-collector:
        condition: service_started
    environment:
      HTTP_ADDR: :8081
      DATABASE_DSN: postgres://pociag:${POSTGRES_PASSWORD}@postgres:5432/pociag?sslmode=disable
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: pociag-lake
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_USE_PATH_STYLE: "true"
      PLK_BASE_URL: ${PLK_BASE_URL:?Set PLK_BASE_URL in infra/.env}
      PLK_API_KEY: ${PLK_API_KEY:?Set PLK_API_KEY in infra/.env}
    ports:
      - "8082:8081"
    logging: *default-logging

  # ── Data Service ─────────────────────────────────────────────────────────────
  data-service:
    build:
      context: ../services/go/data-service
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    environment:
      HTTP_ADDR: :8083
      DATABASE_DSN: postgres://pociag:${POSTGRES_PASSWORD}@postgres:5432/pociag?sslmode=disable
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
    ports:
      - "8083:8083"
    logging: *default-logging

  # ── Jaeger (tracing UI) ─────────────────────────────────────────────── tracing
  jaeger:
    image: jaegertracing/all-in-one:1.63.0
    profiles: ["tracing", "all"]
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # Jaeger UI
      - "14250:14250"  # gRPC
    logging: *default-logging

  # ── Prometheus ──────────────────────────────────────────────────── monitoring
  prometheus:
    image: prom/prometheus:v3.1.0
    profiles: ["monitoring", "all"]
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    logging: *default-logging

  # ── Grafana ──────────────────────────────────────────────────────── monitoring
  grafana:
    image: grafana/grafana:11.4.0
    profiles: ["monitoring", "all"]
    restart: unless-stopped
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    logging: *default-logging

  # ── Apache Airflow ────────────────────────────────────────────────────── dag
  airflow-db:
    image: postgres:16-alpine
    profiles: ["airflow", "all"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging: *default-logging

  airflow-init:
    image: apache/airflow:2.10.4
    profiles: ["airflow", "all"]
    depends_on:
      airflow-db:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD}@airflow-db:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
      AIRFLOW__WEBSERVER__BASE_URL: http://localhost:8090
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    entrypoint: /bin/bash
    command: >
      -c "
      pip install --quiet httpx psycopg2-binary boto3 opentelemetry-sdk opentelemetry-api opentelemetry-exporter-otlp-proto-grpc &&
      airflow db migrate &&
      airflow users create --username admin --firstname Admin --lastname User --role Admin --email admin@example.com --password admin || true &&
      airflow connections delete pociag_collector 2>/dev/null; airflow connections add pociag_collector --conn-type http --conn-host collector --conn-port 8081 --conn-schema http &&
      airflow connections delete pociag_postgres 2>/dev/null; airflow connections add pociag_postgres --conn-type postgres --conn-host postgres --conn-port 5432 --conn-login pociag --conn-password ${POSTGRES_PASSWORD} --conn-schema pociag &&
      airflow connections delete pociag_s3 2>/dev/null; airflow connections add pociag_s3 --conn-type aws --conn-login ${MINIO_ROOT_USER:-minioadmin} --conn-password ${MINIO_ROOT_PASSWORD} --conn-extra '{\"endpoint_url\": \"http://minio:9000\", \"bucket\": \"pociag-lake\"}'
      "
    restart: on-failure

  airflow-webserver:
    image: apache/airflow:2.10.4
    profiles: ["airflow", "all"]
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD}@airflow-db:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
      AIRFLOW__WEBSERVER__BASE_URL: http://localhost:8090
      _PIP_ADDITIONAL_REQUIREMENTS: httpx psycopg2-binary boto3 opentelemetry-sdk opentelemetry-api opentelemetry-exporter-otlp-proto-grpc
    volumes:
      - ../airflow/dags:/opt/airflow/dags:ro
      - ../airflow/plugins:/opt/airflow/plugins:ro
      - airflow_logs:/opt/airflow/logs
    ports:
      - "8090:8080"
    command: webserver
    logging: *default-logging

  airflow-scheduler:
    image: apache/airflow:2.10.4
    profiles: ["airflow", "all"]
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD}@airflow-db:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW__WEBSERVER__SECRET_KEY}
      AIRFLOW__WEBSERVER__BASE_URL: http://localhost:8090
      _PIP_ADDITIONAL_REQUIREMENTS: httpx psycopg2-binary boto3 opentelemetry-sdk opentelemetry-api opentelemetry-exporter-otlp-proto-grpc
    volumes:
      - ../airflow/dags:/opt/airflow/dags:ro
      - ../airflow/plugins:/opt/airflow/plugins:ro
      - airflow_logs:/opt/airflow/logs
    command: scheduler
    logging: *default-logging

volumes:
  minio_data:
  postgres_data:
  airflow_db_data:
  airflow_logs:
  prometheus_data:
  grafana_data:

