openapi: "3.1.0"

info:
  title: "Pociag Collector API"
  version: "0.2.0"
  description: |
    Internal extraction service (stage 1 of ELT).
    Fetches PLK API data and lands raw payloads.
    No transformation or deduplication.

servers:
  - url: http://localhost:8081
    description: Local development

# ── Tags ─────────────────────────────────────────────────────────────────────
tags:
  - name: health
    description: Liveness and readiness probes
  - name: fetch
    description: Raw data extraction from PLK API
  - name: status
    description: Ingestion run tracking

# ── Paths ────────────────────────────────────────────────────────────────────
paths:
  /healthz:
    get:
      summary: Liveness probe
      operationId: healthz
      tags: [health]
      responses:
        "200":
          description: Service is alive

  /readyz:
    get:
      summary: Readiness probe
      operationId: readyz
      tags: [health]
      responses:
        "200":
          description: Service is ready to accept traffic
        "503":
          description: Service is not ready

  # ── Dictionary Sync ────────────────────────────────────────────────────────

  /api/v1/fetch/dictionaries:
    post:
      summary: Fetch all dictionaries from PLK API into raw landing
      description: |
        Fetches all PLK dictionaries and lands raw payloads.
      operationId: fetchDictionaries
      tags: [fetch]
      responses:
        "200":
          description: Fetch completed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FetchDictionariesResult"
        "502":
          description: Upstream PLK API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Schedule Fetch ─────────────────────────────────────────────────────────

  /api/v1/fetch/schedules:
    post:
      summary: Fetch schedules from PLK API into raw landing
      description: |
        Pulls schedule data for a date range and lands raw payloads.
        Pagination is handled internally.
      operationId: fetchSchedules
      tags: [fetch]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FetchSchedulesRequest"
      responses:
        "200":
          description: Fetch completed, raw data landed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FetchResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Fetch already running for this date range
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Upstream PLK API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Operations Fetch ───────────────────────────────────────────────────

  /api/v1/fetch/operations:
    post:
      summary: Fetch train operations from PLK API into raw landing
      description: |
        Pulls operations for a date and lands raw payloads.
        Includes planned/actual timing data and handles pagination internally.
      operationId: fetchOperations
      tags: [fetch]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FetchOperationsRequest"
      responses:
        "200":
          description: Fetch completed, raw data landed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FetchResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Fetch already running for this date
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Upstream PLK API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Disruptions Fetch ──────────────────────────────────────────────────

  /api/v1/fetch/disruptions:
    post:
      summary: Fetch disruptions from PLK API into raw landing
      description: |
        Pulls disruptions for a date range and lands raw payloads.
      operationId: fetchDisruptions
      tags: [fetch]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FetchDisruptionsRequest"
      responses:
        "200":
          description: Fetch completed, raw data landed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FetchResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Fetch already running for this date range
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Upstream PLK API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── Fetch Status ────────────────────────────────────────────────────────────

  /api/v1/fetch/status:
    get:
      summary: Get recent fetch run status
      description: Returns the last N fetch runs for monitoring and DAG decision logic.
      operationId: getFetchStatus
      tags: [status]
      parameters:
        - name: pipeline
          in: query
          description: Filter by pipeline name (schedules, operations, disruptions, dictionaries)
          schema:
            type: string
            enum: [schedules, operations, disruptions, dictionaries]
        - name: limit
          in: query
          description: Number of recent runs to return
          schema:
            type: integer
            default: 10
            maximum: 100
      responses:
        "200":
          description: List of recent ingestion runs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestionStatusResponse"

# ── Components ───────────────────────────────────────────────────────────────
components:
  responses:
    BadRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      required: [error, message]
      additionalProperties: false
      properties:
        error:
          type: string
          description: Machine-readable error code
        message:
          type: string
          description: Human-readable error description
        trace_id:
          type: string
          description: Trace ID for debugging

    # ── Request Bodies ─────────────────────────────────────────────────────────

    FetchSchedulesRequest:
      type: object
      required: [date_from, date_to]
      additionalProperties: false
      properties:
        date_from:
          type: string
          format: date
          description: Start date for schedule fetch (inclusive)
        date_to:
          type: string
          format: date
          description: End date for schedule fetch (inclusive)
        force:
          type: boolean
          default: false
          description: Force re-fetch even if recent successful run exists

    FetchOperationsRequest:
      type: object
      required: [date]
      additionalProperties: false
      properties:
        date:
          type: string
          format: date
          description: Operating date to fetch operations for
        force:
          type: boolean
          default: false
          description: Force re-fetch even if recent successful run exists

    FetchDisruptionsRequest:
      type: object
      required: [date_from, date_to]
      additionalProperties: false
      properties:
        date_from:
          type: string
          format: date
          description: Start date for disruptions fetch (inclusive)
        date_to:
          type: string
          format: date
          description: End date for disruptions fetch (inclusive)
        force:
          type: boolean
          default: false
          description: Force re-fetch even if recent successful run exists

    # ── Response Bodies ────────────────────────────────────────────────────────

    FetchDictionariesResult:
      type: object
      required: [fetched_types]
      additionalProperties: false
      properties:
        fetched_types:
          type: object
          additionalProperties:
            type: integer
          description: "Map of dictionary type to record count landed (e.g. {\"stations\": 3420, \"carriers\": 15})"
        duration_ms:
          type: integer
          format: int64
          description: Total fetch duration in milliseconds

    FetchResult:
      type: object
      required: [pipeline, status, records_fetched, pages_landed]
      additionalProperties: false
      properties:
        pipeline:
          type: string
          description: Pipeline name
        status:
          type: string
          enum: [success, failed]
          description: Fetch outcome
        records_fetched:
          type: integer
          description: Total records fetched from PLK API
        pages_landed:
          type: integer
          description: Number of raw payload pages landed
        duration_ms:
          type: integer
          format: int64
          description: Fetch duration in milliseconds
        error_message:
          type: string
          description: Error details (only when status=failed)

    IngestionRun:
      type: object
      required: [id, pipeline, run_date, status, started_at]
      additionalProperties: false
      properties:
        id:
          type: integer
          format: int64
        pipeline:
          type: string
        run_date:
          type: string
          format: date
        status:
          type: string
          enum: [running, success, failed]
        records_fetched:
          type: integer
        records_upserted:
          type: integer
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        error_message:
          type: string

    IngestionStatusResponse:
      type: object
      required: [runs]
      additionalProperties: false
      properties:
        runs:
          type: array
          items:
            $ref: "#/components/schemas/IngestionRun"
